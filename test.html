<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYAS BANK - Тест</title>
</head>
<body>
    <h1>ILYAS BANK - Тестовая версия</h1>
    <div id="content">
        <p>Загрузка...</p>
    </div>

    <script>
        console.log('🚀 Тестовая страница загружена');

        // Простая проверка
        const content = document.getElementById('content');

        // Проверяем основные объекты
        const checks = [
            'Store',
            'Router',
            'API',
            'AuthModule'
        ];

        let results = [];
        let allGood = true;

        checks.forEach(name => {
            try {
                const obj = window[name];
                if (typeof obj !== 'undefined') {
                    results.push(`✅ ${name}: OK`);
                } else {
                    results.push(`❌ ${name}: НЕ НАЙДЕН`);
                    allGood = false;
                }
            } catch (e) {
                results.push(`❌ ${name}: ОШИБКА - ${e.message}`);
                allGood = false;
            }
        });

        content.innerHTML = `
            <h2>Результаты проверки:</h2>
            <ul>
                ${results.map(r => `<li>${r}</li>`).join('')}
            </ul>
            ${allGood ?
                '<p style="color: green; font-weight: bold;">✅ Все модули загружены успешно!</p>' +
                '<button onclick="startApp()">Запустить приложение</button>' :
                '<p style="color: red; font-weight: bold;">❌ Есть проблемы с загрузкой модулей</p>'
            }
        `;

        function startApp() {
            try {
                console.log('🚀 Запуск приложения...');
                // Простая инициализация
                Store.setState({ currentPage: 'home' });
                Router.init({
                    '/': {
                        component: {
                            render: () => '<h2>Главная страница</h2><p>Приложение работает!</p>',
                            init: () => console.log('Главная страница инициализирована')
                        },
                        options: { title: 'Главная' }
                    }
                });
                content.innerHTML = '<h2>✅ Приложение запущено!</h2><p>Перейдите на <a href="index-new.html">полную версию</a></p>';
            } catch (e) {
                content.innerHTML = `<h2>❌ Ошибка запуска:</h2><p>${e.message}</p>`;
                console.error('Ошибка:', e);
            }
        }
    </script>

    <!-- Загружаем основные модули -->
    <script src="js/services/validator.js"></script>
    <script src="js/services/sanitizer.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/state/store.js"></script>
    <script src="js/ui/router.js"></script>
    <script src="js/ui/notifications.js"></script>
    <script src="js/ui/components.js"></script>
    <script src="js/modules/auth.js"></script>
</body>
</html>
