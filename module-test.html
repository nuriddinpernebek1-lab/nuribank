<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYAS BANK - Тест модулей</title>
</head>
<body>
    <h1>ILYAS BANK - Тест отдельных модулей</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        let testResults = [];

        function testModule(name, url, callback) {
            return fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(code => {
                    try {
                        // Пытаемся выполнить код
                        eval(code);
                        if (callback && typeof callback === 'function') {
                            callback();
                        }
                        testResults.push(`✅ ${name}: OK`);
                    } catch (e) {
                        testResults.push(`❌ ${name}: ОШИБКА - ${e.message}`);
                    }
                })
                .catch(error => {
                    testResults.push(`❌ ${name}: НЕ ЗАГРУЖЕН - ${error.message}`);
                });
        }

        async function runTests() {
            const modules = [
                { name: 'Validator', url: 'js/services/validator.js' },
                { name: 'Sanitizer', url: 'js/services/sanitizer.js' },
                { name: 'API', url: 'js/services/api.js' },
                { name: 'Store', url: 'js/state/store.js' },
                { name: 'Router', url: 'js/ui/router.js' },
                { name: 'Notifications', url: 'js/ui/notifications.js' },
                { name: 'Components', url: 'js/ui/components.js' },
                { name: 'AuthModule', url: 'js/modules/auth.js' },
                { name: 'HomePage', url: 'js/pages/home.js' },
                { name: 'LoginPage', url: 'js/pages/login.js' },
                { name: 'RegisterPage', url: 'js/pages/register.js' },
                { name: 'DashboardPage', url: 'js/pages/dashboard.js' }
            ];

            for (const module of modules) {
                await testModule(module.name, module.url);
                results.innerHTML = `<ul>${testResults.map(r => `<li>${r}</li>`).join('')}</ul>`;
            }

            results.innerHTML += '<h2>Итоги:</h2>' +
                `<p>Всего модулей: ${modules.length}</p>` +
                `<p>Успешно: ${testResults.filter(r => r.startsWith('✅')).length}</p>` +
                `<p>Ошибок: ${testResults.filter(r => r.startsWith('❌')).length}</p>`;
        }

        runTests();
    </script>
</body>
</html>
