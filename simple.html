<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYAS BANK - Простая версия</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .nav button {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav button:hover {
            background: #f0f0f0;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn:hover {
            background: #218838;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ILYAS BANK</h1>

        <nav class="nav">
            <button onclick="showPage('home')">Главная</button>
            <button onclick="showPage('login')">Вход</button>
            <button onclick="showPage('register')">Регистрация</button>
            <button onclick="showPage('dashboard')" id="dashboardBtn" style="display: none;">Кабинет</button>
        </nav>

        <div id="alerts"></div>

        <!-- Главная страница -->
        <div id="home" class="page active">
            <h2>Добро пожаловать в ILYAS BANK</h2>
            <p>Современный финтех-банк для удобного управления финансами.</p>
            <ul>
                <li>✅ Переводы без комиссий</li>
                <li>✅ Кредиты с низкими ставками</li>
                <li>✅ Безопасность и удобство</li>
            </ul>
        </div>

        <!-- Форма входа -->
        <div id="login" class="page">
            <h2>Вход в систему</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
        </div>

        <!-- Форма регистрации -->
        <div id="register" class="page">
            <h2>Регистрация</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">Имя:</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
        </div>

        <!-- Кабинет -->
        <div id="dashboard" class="page">
            <h2>Личный кабинет</h2>
            <p>Добро пожаловать, <span id="userName">Пользователь</span>!</p>
            <div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 5px; margin: 20px 0;">
                <h3>Ваш баланс: <span id="balance">0</span> ₽</h3>
                <button onclick="addMoney()" class="btn">Добавить деньги</button>
            </div>
            <button onclick="logout()" class="btn btn-danger">Выйти</button>
        </div>
    </div>

    <script>
        // Простое хранилище данных (в реальности используйте localStorage или сервер)
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        let currentBalance = parseFloat(localStorage.getItem('balance') || '0');

        // Функции навигации
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');

            // Обновляем навигацию
            const dashboardBtn = document.getElementById('dashboardBtn');
            dashboardBtn.style.display = currentUser ? 'inline-block' : 'none';
        }

        // Показать уведомление
        function showAlert(message, type = 'success') {
            const alerts = document.getElementById('alerts');
            alerts.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alerts.innerHTML = '';
            }, 3000);
        }

        // Обработка входа
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                currentUser = user;
                currentBalance = parseFloat(localStorage.getItem(`balance_${user.email}`) || '0');
                updateDashboard();
                showPage('dashboard');
                showAlert('Успешный вход!');
            } else {
                showAlert('Неверный email или пароль', 'error');
            }
        }

        // Обработка регистрации
        function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Проверяем, существует ли пользователь
            if (users.find(u => u.email === email)) {
                showAlert('Пользователь с таким email уже существует', 'error');
                return;
            }

            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem(`balance_${email}`, '1000'); // Стартовый бонус

            showAlert('Регистрация успешна! Теперь войдите в систему.');
            showPage('login');
        }

        // Обновление кабинета
        function updateDashboard() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('balance').textContent = currentBalance.toFixed(2);
            }
        }

        // Добавить деньги (демо)
        function addMoney() {
            currentBalance += 500;
            localStorage.setItem(`balance_${currentUser.email}`, currentBalance.toString());
            updateDashboard();
            showAlert('Добавлено 500 ₽ на счет!');
        }

        // Выход
        function logout() {
            currentUser = null;
            showPage('home');
            showAlert('Вы вышли из системы');
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            console.log('ILYAS BANK загружен!');
            updateDashboard();
        });
    </script>
</body>
</html>
