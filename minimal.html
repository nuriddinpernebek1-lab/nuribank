<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYAS BANK - Минимальная версия</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav { background: #f0f0f0; padding: 10px; margin-bottom: 20px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .nav a.active { font-weight: bold; }
        #content { border: 1px solid #ddd; padding: 20px; min-height: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ILYAS BANK - Минимальная версия</h1>

        <nav class="nav">
            <a href="#" onclick="navigate('/')">Главная</a>
            <a href="#" onclick="navigate('/login')">Вход</a>
            <a href="#" onclick="navigate('/register')">Регистрация</a>
        </nav>

        <div id="content">
            <p>Загрузка...</p>
        </div>
    </div>

    <script>
        console.log('🚀 Минимальная версия загружена');

        // Простой роутер
        const routes = {
            '/': {
                title: 'Главная',
                render: () => `
                    <h2>Добро пожаловать в ILYAS BANK</h2>
                    <p>Это минимальная версия приложения для тестирования.</p>
                    <button onclick="navigate('/login')">Войти</button>
                    <button onclick="navigate('/register')">Регистрация</button>
                `
            },
            '/login': {
                title: 'Вход',
                render: () => `
                    <h2>Вход в систему</h2>
                    <form onsubmit="handleLogin(event)">
                        <input type="email" placeholder="Email" required><br><br>
                        <input type="password" placeholder="Пароль" required><br><br>
                        <button type="submit">Войти</button>
                    </form>
                    <p><a href="#" onclick="navigate('/register')">Регистрация</a></p>
                `
            },
            '/register': {
                title: 'Регистрация',
                render: () => `
                    <h2>Регистрация</h2>
                    <form onsubmit="handleRegister(event)">
                        <input type="text" placeholder="Имя" required><br><br>
                        <input type="email" placeholder="Email" required><br><br>
                        <input type="password" placeholder="Пароль" required><br><br>
                        <button type="submit">Зарегистрироваться</button>
                    </form>
                    <p><a href="#" onclick="navigate('/login')">Вход</a></p>
                `
            }
        };

        function navigate(path) {
            console.log('Навигация на:', path);
            const route = routes[path];
            if (route) {
                document.title = route.title;
                document.getElementById('content').innerHTML = route.render();

                // Обновляем активную ссылку
                document.querySelectorAll('.nav a').forEach(a => {
                    a.classList.remove('active');
                    if (a.onclick.toString().includes(path)) {
                        a.classList.add('active');
                    }
                });
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            alert('Функция входа пока не реализована');
        }

        function handleRegister(event) {
            event.preventDefault();
            alert('Функция регистрации пока не реализована');
        }

        // Начальная навигация
        navigate('/');
    </script>
</body>
</html>
