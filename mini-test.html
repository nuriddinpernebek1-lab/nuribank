<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYAS BANK - Мини-тест</title>
</head>
<body>
    <h1>ILYAS BANK - Мини-тест модулей</h1>
    <div id="content">
        <p>Проверка основных модулей...</p>
    </div>

    <script>
        console.log('🚀 Мини-тест запущен');

        const content = document.getElementById('content');
        let results = [];
        let allGood = true;

        // Проверяем основные объекты
        const checks = [
            { name: 'Store', check: () => typeof Store !== 'undefined' && typeof Store.getValue === 'function' },
            { name: 'Router', check: () => typeof Router !== 'undefined' && typeof Router.init === 'function' },
            { name: 'API', check: () => typeof API !== 'undefined' && typeof API.request === 'function' },
            { name: 'AuthModule', check: () => typeof AuthModule !== 'undefined' && typeof AuthModule.login === 'function' },
            { name: 'Validator', check: () => typeof Validator !== 'undefined' && typeof Validator.validateEmail === 'function' },
            { name: 'Sanitizer', check: () => typeof Sanitizer !== 'undefined' && typeof Sanitizer.sanitize === 'function' }
        ];

        checks.forEach(({ name, check }) => {
            try {
                if (check()) {
                    results.push(`✅ ${name}: OK`);
                } else {
                    results.push(`❌ ${name}: НЕ РАБОТАЕТ`);
                    allGood = false;
                }
            } catch (e) {
                results.push(`❌ ${name}: ОШИБКА - ${e.message}`);
                allGood = false;
            }
        });

        content.innerHTML = `
            <h2>Результаты проверки:</h2>
            <ul>
                ${results.map(r => `<li>${r}</li>`).join('')}
            </ul>
            ${allGood ?
                '<p style="color: green; font-weight: bold;">✅ Все основные модули работают!</p>' +
                '<p>Теперь попробуйте открыть <a href="index-new.html">основную страницу</a></p>' :
                '<p style="color: red; font-weight: bold;">❌ Есть проблемы с модулями</p>'
            }
        `;

        console.log('Результаты мини-теста:', results);
    </script>

    <!-- Загружаем только основные модули -->
    <script src="js/services/validator.js"></script>
    <script src="js/services/sanitizer.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/state/store.js"></script>
    <script src="js/ui/router.js"></script>
    <script src="js/ui/notifications.js"></script>
    <script src="js/ui/components.js"></script>
    <script src="js/modules/auth.js"></script>
</body>
</html>
